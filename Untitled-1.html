<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, 
initial-scale=1"> 
    <title>Document</title>
 <link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" >
<style>


body {
  background-image: url("sitefisica1  (3).jpg");
  background-repeat: no-repeat;
        }

   .container{
    text-align: center;
    padding: 20px;
color: rgb(243, 248, 252);
}
   

</style>
</head>


<body>
    <div class="container">
 <h1 class="">JOGO DA ILHA</small></h1>

    </div>

    <div class="container">
  <div class="row text-center">

  
    <div class="col-md-4 d-flex flex-column align-items-center">
      <h5 class="bg-success bg-opacity-50 rounded  p-2 mb-2">Não pode</h5>
      <div id="nao-pode" class="bg-light text-dark rounded shadow p-3" style="height:150px; width:100%;"></div>
    </div>

   
    <div class="col-md-4 mt-4 d-flex flex-column align-items-center">
      <h5 class="bg-success bg-opacity-50 rounded  p-1 mb-2">Tentar adivinhar</h5>
      <input type="text" id="resposta" class="form-control text-center" placeholder="A regra é..." >
  <button id="enviar" class="btn btn-primary bg-success  rounded ms-1 mt-3">Enviar</button>
</div>

    <div class="col-md-4 d-flex flex-column align-items-center">
      <h5 class="bg-success bg-opacity-50 rounded p-2 mb-2">Pode</h5>
      <div id="pode" class="bg-light text-dark rounded shadow p-3" style="height:150px; width:100%;"></div>
    </div>

  </div>
</div>

<div class="container text-center mt-4">
  <label for="resposta" class="form-label h5 text-white">Faça uma tentativa:</label>
  <div class="d-flex justify-content-center">
    <input type="text"id="baixo" class="form-control w-50" placeholder="Bola,pente,tênis...">
    <button  id="testar" class="btn btn-primary bg-success rounded  ms-1">Testar</button>
<br>
   
  </div>
</div>

     
</body>
<script>

const inputMeio = document.getElementById("resposta");
const botaoEnviar = document.getElementById("enviar");

const inputBaixo = document.getElementById("baixo");
const botaoTestar = document.getElementById("testar");

const caixaPode = document.getElementById("pode");
const caixaNaoPode = document.getElementById("nao-pode");


const regraCorreta = "frutas";


const pode = ["maçã", "banana","manga", "uva", "laranja", "morango","tangerina","pêra","mamão","tomate","melancia","abacaxi","kiwi","melão","maracuja","goiaba","acerola","pitaia","caju","pessêgo","lichia","framboesa","abacate"];
const naoPode = ["carro","pente","tênis","caderno","caneta","faca","bicicleta","agua","arroz","feijão","prato", "bola", "cadeira", "mesa","celular","quadro","fogo","isqueiro","areia","papel","livro","rádio"];

function normalizar(texto) {
    return texto
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
}

function contarVogaisConsoantes(palavra) {
    const vogais = "aeiou";
    let V = 0;
    let C = 0;
    const texto = palavra.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

    for (const letra of texto) {
        if (/[a-z]/.test(letra)) {
            if (vogais.includes(letra)) V++;
            else C++;
        }
    }
    return { V, C };
}


function verificarResposta(input) {
    const resposta = input.value.trim().toLowerCase();

    if (resposta === regraCorreta.toLowerCase()) {
        alert("🎉 Parabéns! Você acertou a regra!");

        
        caixaPode.innerHTML = "";
        caixaNaoPode.innerHTML = "";
        inputBaixo.value = "";
        inputMeio.value = "";

    } else {
        alert("❌ Ops! Tente novamente.");
         input.value = ""; 
    }
}

function verificarItem() {
    const valorOriginal = inputBaixo.value.trim();
    if (!valorOriginal) return;

    const contagem = contarVogaisConsoantes(valorOriginal);

    if (pode.map(normalizar).includes(normalizar(valorOriginal))) {
        alert(`✅ ${valorOriginal} pode! (V=${contagem.V} C=${contagem.C})`);
        caixaPode.innerHTML += `${valorOriginal} (V=${contagem.V} C=${contagem.C})<br>`;
    } else if (naoPode.map(normalizar).includes(normalizar(valorOriginal))) {
        alert(`❌ ${valorOriginal} não pode! (V=${contagem.V} C=${contagem.C})`);
        caixaNaoPode.innerHTML += `${valorOriginal} (V=${contagem.V} C=${contagem.C})<br>`;
    } else {
        alert(`❌ ${valorOriginal} não pode. (V=${contagem.V} C=${contagem.C})`);
        caixaNaoPode.innerHTML += `${valorOriginal} (V=${contagem.V} C=${contagem.C})<br>`;
    }

    inputBaixo.value = "";
}

botaoEnviar.addEventListener("click", () => verificarResposta(inputMeio));
botaoTestar.addEventListener("click", verificarItem);


</script>
</html>
